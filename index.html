<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // in sandboxed iframe environments.
      (function() {
        try {
          const originalFetch = window.fetch || globalThis.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;
            const descriptor = {
              get() {
                return currentFetch;
              },
              set(value) {
                currentFetch = value;
              },
              configurable: true,
              enumerable: true
            };
            Object.defineProperty(window, 'fetch', descriptor);
            Object.defineProperty(globalThis, 'fetch', descriptor);
          }
        } catch (e) {
          console.warn('Unable to patch fetch getter/setter:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
